<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CivicEase — Book Appointment</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark">
  <header>
    <div class="nav-brand">
      <h1>CivicEase — Book Appointment</h1>
    </div>
    <div class="nav-actions">
      <a class="button-link" href="main.html">Dashboard</a>
      <button id="themeToggle">☀️</button>
    </div>
  </header>

  <main>
    <section class="card" id="bookingCard">
      <h2>Book Appointment</h2>
      <form id="bookingForm">
        <input id="name" placeholder="Full name" required />
        <input id="phone" placeholder="+2348123456789" required />
        <select id="service" name="service" required>
          <option value="">Select service</option>
          <option value="NIN Enrollment">NIN Enrollment</option>
          <option value="Passport">Passport</option>
          <option value="Driver's License">Driver's License</option>
          <option value="Hospital OPD">Hospital OPD</option>
          <option value="Local Govt. Certificate">Local Govt. Certificate</option>
        </select>
        <input id="date" type="date" required />
        <input id="time" type="time" required />
        <button type="submit">Book & Get Queue</button>
      </form>

      <div id="result" class="hidden"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
